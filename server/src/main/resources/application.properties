spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8080}
spring.application.name=wildfire-spot-server

robot.gateway.mode=${ROBOT_GATEWAY_MODE:mock}
robot.api.base-url=${ROBOT_API_BASE_URL:http://localhost:8000}
robot.api.connect-timeout-ms=${ROBOT_API_CONNECT_TIMEOUT_MS:3000}
robot.api.read-timeout-ms=${ROBOT_API_READ_TIMEOUT_MS:5000}

spring.jackson.serialization.write-dates-as-timestamps=false

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

device.offline-threshold-seconds=${DEVICE_OFFLINE_THRESHOLD_SECONDS:30}

