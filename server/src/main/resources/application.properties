server.port=${SERVER_PORT:8080}
spring.application.name=wildfire-spot-server

robot.gateway.mode=${ROBOT_GATEWAY_MODE:mock}
robot.api.base-url=${ROBOT_API_BASE_URL:http://localhost:8000}
robot.api.connect-timeout-ms=${ROBOT_API_CONNECT_TIMEOUT_MS:3000}
robot.api.read-timeout-ms=${ROBOT_API_READ_TIMEOUT_MS:5000}

spring.jackson.serialization.write-dates-as-timestamps=false
